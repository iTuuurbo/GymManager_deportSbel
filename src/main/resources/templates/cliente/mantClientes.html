<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion de Clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4">

    <div class="card shadow">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h3 class="mb-0">Mantenimiento de Clientes</h3>
            <button type="button" class="btn btn-light btn-sm" onclick="nuevoCliente()">+ Nuevo cliente</button>
        </div>

        <div class="card-body">

            <!-- Mensajes flash -->
            <div th:if="${msg}" class="alert alert-success alert-dismissible fade show" role="alert">
                <span th:text="${msg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <table class="table table-bordered table-hover table-striped align-middle">
                <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>DNI</th>
                    <th>Nombres</th>
                    <th>Apellidos</th>
                    <th>Telefono</th>
                    <th>Usuario</th>
                    <th>Estado</th>
                    <th class="text-end">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="c : ${clientes}">
                    <td th:text="${c.idCliente}">1</td>
                    <td th:text="${c.dni}">00000000</td>
                    <td th:text="${c.nombres}">Nombre</td>
                    <td th:text="${c.apellidos}">Apellido</td>
                    <td th:text="${c.telefono}">-</td>
                    <td th:text="${c.usuario != null ? c.usuario.username : '-'}">user</td>
                    <td>
                        <span class="badge"
                              th:classappend="${c.estado.name() == 'ACTIVO' ? 'text-bg-success' : (c.estado.name() == 'SUSPENDIDO' ? 'text-bg-warning' : 'text-bg-secondary')}"
                              th:text="${c.estado}">ACTIVO</span>
                    </td>
                    <td class="text-end">
                        <button type="button" class="btn btn-sm btn-warning"
                                th:onclick="|editarCliente(${c.idCliente})|">Editar</button>
                        <a th:href="@{/gestioncliente/desactivar/{id}(id=${c.idCliente})}"
                           class="btn btn-sm btn-danger"
                           onclick="return confirm('¿Desactivar este cliente?');">Desactivar</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(clientes)}">
                    <td colspan="8" class="text-center text-muted py-4">No hay clientes registrados.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- ================= Ventana modal ================= -->
<div class="modal fade" id="modalCliente" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <form id="formCliente" th:action="@{/gestioncliente/registrar}" th:object="${cliente}" method="post">

                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitulo">Registrar Cliente</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <!-- id oculto: 0 = nuevo, >0 = editar -->
                    <input type="hidden" th:field="*{idCliente}">

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">DNI</label>
                            <input type="text" class="form-control" th:field="*{dni}"
                                   maxlength="8" minlength="8" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Nombres</label>
                            <input type="text" class="form-control" th:field="*{nombres}" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Apellidos</label>
                            <input type="text" class="form-control" th:field="*{apellidos}" required>
                        </div>

                        <div class="col-md-4 mb-3">
                            <label class="form-label">Telefono</label>
                            <input type="text" class="form-control" th:field="*{telefono}" maxlength="15">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" th:field="*{email}" maxlength="120">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Fecha de nacimiento</label>
                            <input type="date" class="form-control" th:field="*{fechaNacimiento}">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Usuario</label>
                            <select class="form-select" th:field="*{usuario.idUsuario}" required>
                                <option value="0">Seleccione un usuario</option>
                                <option th:each="u : ${usuarios}"
                                        th:value="${u.idUsuario}"
                                        th:text="${u.username}">usuario</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Estado</label>
                            <select class="form-select" th:field="*{estado}" required>
                                <option th:each="e : ${estados}"
                                        th:value="${e}"
                                        th:text="${e}">ACTIVO</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const URL_BASE = '/gestioncliente';
    const modalCliente = new bootstrap.Modal(document.getElementById('modalCliente'));
    const form = document.getElementById('formCliente');

    // Abrir modal en modo "nuevo"
    function nuevoCliente() {
        form.reset();
        form.setAttribute('action', URL_BASE + '/registrar');
        document.getElementById('idCliente').value = 0;
        document.getElementById('estado').value = 'ACTIVO';
        document.getElementById('usuario.idUsuario').value = '0';
        document.getElementById('modalTitulo').textContent = 'Registrar Cliente';
        modalCliente.show();
    }

    // Abrir modal en modo "editar": trae los datos por AJAX y los carga
    function editarCliente(id) {
        fetch(URL_BASE + '/buscar/' + id)
            .then(resp => resp.json())
            .then(c => {
                form.setAttribute('action', URL_BASE + '/actualizar');
                document.getElementById('idCliente').value = c.idCliente;
                document.getElementById('dni').value = c.dni ?? '';
                document.getElementById('nombres').value = c.nombres ?? '';
                document.getElementById('apellidos').value = c.apellidos ?? '';
                document.getElementById('telefono').value = c.telefono ?? '';
                document.getElementById('email').value = c.email ?? '';
                document.getElementById('fechaNacimiento').value = c.fechaNacimiento ?? '';
                document.getElementById('usuario.idUsuario').value = (c.usuario && c.usuario.idUsuario) ? c.usuario.idUsuario : '0';
                document.getElementById('estado').value = c.estado ?? 'ACTIVO';
                document.getElementById('modalTitulo').textContent = 'Editar Cliente';
                modalCliente.show();
            })
            .catch(() => alert('No se pudo cargar el cliente.'));
    }
</script>
</body>
</html>
