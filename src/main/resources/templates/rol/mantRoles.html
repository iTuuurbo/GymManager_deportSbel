<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion de Roles</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4">

    <div class="card shadow">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h3 class="mb-0">Mantenimiento de Roles</h3>
            <button type="button" class="btn btn-light btn-sm" onclick="nuevoRol()">+ Nuevo rol</button>
        </div>

        <div class="card-body">
            <div th:if="${msg}" class="alert alert-success alert-dismissible fade show" role="alert">
                <span th:text="${msg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <table class="table table-bordered table-hover table-striped align-middle">
                <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Nombre</th>
                    <th>Estado</th>
                    <th class="text-end">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="r : ${roles}">
                    <td th:text="${r.idRol}">1</td>
                    <td th:text="${r.nombre}">ADMIN</td>
                    <td>
                        <span class="badge"
                              th:classappend="${r.estado == 1 ? 'text-bg-success' : 'text-bg-secondary'}"
                              th:text="${r.estado == 1 ? 'Activo' : 'Inactivo'}">Activo</span>
                    </td>
                    <td class="text-end">
                        <button type="button" class="btn btn-sm btn-warning"
                                th:onclick="|editarRol(${r.idRol})|">Editar</button>
                        <a th:href="@{/gestionrol/desactivar/{id}(id=${r.idRol})}"
                           class="btn btn-sm btn-danger"
                           onclick="return confirm('¿Desactivar este rol?');">Desactivar</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(roles)}">
                    <td colspan="4" class="text-center text-muted py-4">No hay roles registrados.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal -->
<div class="modal fade" id="modalRol" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <form id="formRol" th:action="@{/gestionrol/registrar}" th:object="${rol}" method="post">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitulo">Registrar Rol</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" th:field="*{idRol}">
                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" class="form-control" th:field="*{nombre}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Estado</label>
                        <select class="form-select" th:field="*{estado}" required>
                            <option value="1">Activo</option>
                            <option value="0">Inactivo</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const URL_BASE = '/gestionrol';
    const modalRol = new bootstrap.Modal(document.getElementById('modalRol'));
    const form = document.getElementById('formRol');

    function nuevoRol() {
        form.reset();
        form.setAttribute('action', URL_BASE + '/registrar');
        document.getElementById('idRol').value = 0;
        document.getElementById('estado').value = '1';
        document.getElementById('modalTitulo').textContent = 'Registrar Rol';
        modalRol.show();
    }

    function editarRol(id) {
        fetch(URL_BASE + '/buscar/' + id)
            .then(resp => resp.json())
            .then(r => {
                form.setAttribute('action', URL_BASE + '/actualizar');
                document.getElementById('idRol').value = r.idRol;
                document.getElementById('nombre').value = r.nombre ?? '';
                document.getElementById('estado').value = r.estado;
                document.getElementById('modalTitulo').textContent = 'Editar Rol';
                modalRol.show();
            })
            .catch(() => alert('No se pudo cargar el rol.'));
    }
</script>
</body>
</html>
