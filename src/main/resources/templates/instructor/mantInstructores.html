<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymControl - Instructores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <style>
        body { font-family:'Inter',sans-serif; background:#f4f6f9; color:#3a3f47; }
        .material-symbols-outlined { font-size:1.25rem; line-height:1; vertical-align:middle; }
        .card { border:1px solid #e7e9ee; }
        .kpi .ico { width:42px; height:42px; display:flex; align-items:center; justify-content:center; border-radius:10px; }
        .kpi h3 { font-size:1.5rem; }
        thead th { font-size:.76rem; text-transform:uppercase; letter-spacing:.03em; color:#6c757d; }
        table.dataTable td { vertical-align:middle; }
    </style>
</head>
<body>
<div class="container-fluid py-4">

    <div class="d-flex justify-content-between align-items-end mb-3">
        <div>
            <h4 class="fw-bold mb-0">Gestion de Instructores</h4>
            <span class="text-muted small">Personal a cargo de las clases grupales</span>
        </div>
        <button type="button" class="btn btn-primary d-flex align-items-center gap-1" onclick="nuevoInstructor()">
            <span class="material-symbols-outlined">add</span> Nuevo instructor
        </button>
    </div>

    <div class="row g-3 mb-3">
        <div class="col-md-3 col-6">
            <div class="card shadow-sm kpi p-3">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <span class="text-muted small">Total</span>
                        <h3 class="fw-bold mb-0" th:text="${#lists.size(instructores)}">0</h3>
                    </div>
                    <span class="ico bg-primary bg-opacity-10 text-primary"><span class="material-symbols-outlined">groups</span></span>
                </div>
            </div>
        </div>
        <div class="col-md-3 col-6">
            <div class="card shadow-sm kpi p-3">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <span class="text-muted small">Activos</span>
                        <h3 class="fw-bold mb-0 text-success" th:text="${#lists.size(instructores.?[estado.name() == 'ACTIVO'])}">0</h3>
                    </div>
                    <span class="ico bg-success bg-opacity-10 text-success"><span class="material-symbols-outlined">check_circle</span></span>
                </div>
            </div>
        </div>
        <div class="col-md-3 col-6">
            <div class="card shadow-sm kpi p-3">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <span class="text-muted small">Suspendidos</span>
                        <h3 class="fw-bold mb-0 text-warning" th:text="${#lists.size(instructores.?[estado.name() == 'SUSPENDIDO'])}">0</h3>
                    </div>
                    <span class="ico bg-warning bg-opacity-10 text-warning"><span class="material-symbols-outlined">pause_circle</span></span>
                </div>
            </div>
        </div>
        <div class="col-md-3 col-6">
            <div class="card shadow-sm kpi p-3">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <span class="text-muted small">Inactivos</span>
                        <h3 class="fw-bold mb-0 text-secondary" th:text="${#lists.size(instructores.?[estado.name() == 'INACTIVO'])}">0</h3>
                    </div>
                    <span class="ico bg-secondary bg-opacity-10 text-secondary"><span class="material-symbols-outlined">block</span></span>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div th:if="${msg}" class="alert alert-success alert-dismissible fade show py-2" role="alert">
                <span th:text="${msg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show py-2" role="alert">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle w-100" id="tablaInstructores">
                    <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>DNI</th>
                        <th>Nombre completo</th>
                        <th>Especialidad</th>
                        <th>Usuario</th>
                        <th>Estado</th>
                        <th class="text-end">Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="i : ${instructores}">
                        <td th:text="${i.idInstructor}">1</td>
                        <td th:text="${i.dni}">00000000</td>
                        <td class="fw-semibold" th:text="${i.nombres + ' ' + i.apellidos}">Nombre</td>
                        <td th:text="${i.especialidad}">-</td>
                        <td th:text="${i.usuario != null ? i.usuario.username : '-'}">user</td>
                        <td>
                            <span class="badge rounded-pill"
                                  th:classappend="${i.estado.name() == 'ACTIVO' ? 'bg-success-subtle text-success' : (i.estado.name() == 'SUSPENDIDO' ? 'bg-warning-subtle text-warning' : 'bg-secondary-subtle text-secondary')}"
                                  th:text="${i.estado}">ACTIVO</span>
                        </td>
                        <td class="text-end text-nowrap">
                            <button type="button" class="btn btn-sm btn-light border" th:onclick="|editarInstructor(${i.idInstructor})|" title="Editar">
                                <span class="material-symbols-outlined text-primary">edit</span>
                            </button>
                            <a th:href="@{/gestioninstructor/desactivar/{id}(id=${i.idInstructor})}"
                               class="btn btn-sm btn-light border" title="Desactivar"
                               onclick="return confirm('¿Desactivar este instructor?');">
                                <span class="material-symbols-outlined text-danger">person_off</span>
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalInstructor" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <form id="formInstructor" th:action="@{/gestioninstructor/registrar}" th:object="${instructor}" method="post">
                <div class="modal-header bg-primary text-white">
                    <h6 class="modal-title" id="tituloModal">Registrar instructor</h6>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" th:field="*{idInstructor}">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label small text-muted">DNI</label>
                            <input type="text" class="form-control" th:field="*{dni}" maxlength="8" minlength="8" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small text-muted">Nombres</label>
                            <input type="text" class="form-control" th:field="*{nombres}" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small text-muted">Apellidos</label>
                            <input type="text" class="form-control" th:field="*{apellidos}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small text-muted">Especialidad</label>
                            <input type="text" class="form-control" th:field="*{especialidad}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small text-muted">Telefono</label>
                            <input type="text" class="form-control" th:field="*{telefono}" maxlength="15">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small text-muted">Usuario</label>
                            <select class="form-select" th:field="*{usuario.idUsuario}" required>
                                <option value="0">Seleccione un usuario</option>
                                <option th:each="u : ${usuarios}" th:value="${u.idUsuario}" th:text="${u.username}">user</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small text-muted">Estado</label>
                            <select class="form-select" th:field="*{estado}" required>
                                <option th:each="e : ${estados}" th:value="${e}" th:text="${e}">ACTIVO</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const base = '/gestioninstructor';
    let modal;

    $(function () {
        modal = new bootstrap.Modal(document.getElementById('modalInstructor'));
        $('#tablaInstructores').DataTable({
            language: { url: 'https://cdn.datatables.net/plug-ins/1.13.8/i18n/es-ES.json' },
            pageLength: 10,
            order: [ [0, 'asc'] ],
            columnDefs: [{ orderable: false, targets: -1 }]
        });
    });

    function nuevoInstructor() {
        const f = document.getElementById('formInstructor');
        f.reset();
        f.action = base + '/registrar';
        document.getElementById('idInstructor').value = 0;
        document.getElementById('usuario.idUsuario').value = '0';
        document.getElementById('estado').value = 'ACTIVO';
        document.getElementById('tituloModal').textContent = 'Registrar instructor';
        modal.show();
    }

    function editarInstructor(id) {
        fetch(base + '/buscar/' + id).then(r => r.json()).then(i => {
            const f = document.getElementById('formInstructor');
            f.action = base + '/actualizar';
            document.getElementById('idInstructor').value = i.idInstructor;
            document.getElementById('dni').value = i.dni ?? '';
            document.getElementById('nombres').value = i.nombres ?? '';
            document.getElementById('apellidos').value = i.apellidos ?? '';
            document.getElementById('especialidad').value = i.especialidad ?? '';
            document.getElementById('telefono').value = i.telefono ?? '';
            document.getElementById('usuario.idUsuario').value = (i.usuario && i.usuario.idUsuario) ? i.usuario.idUsuario : '0';
            document.getElementById('estado').value = i.estado ?? 'ACTIVO';
            document.getElementById('tituloModal').textContent = 'Editar instructor';
            modal.show();
        }).catch(() => alert('No se pudo cargar el instructor.'));
    }
</script>
</body>
</html>
