<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymControl - Clases Grupales</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <style>
        body { font-family:'Inter',sans-serif; background:#f4f6f9; color:#3a3f47; }
        .material-symbols-outlined { font-size:1.25rem; line-height:1; vertical-align:middle; }
        .card { border:1px solid #e7e9ee; }
        .kpi .ico { width:42px; height:42px; display:flex; align-items:center; justify-content:center; border-radius:10px; }
        .kpi h3 { font-size:1.5rem; }
        thead th { font-size:.76rem; text-transform:uppercase; letter-spacing:.03em; color:#6c757d; }
    </style>
</head>
<body>
<div class="container-fluid py-4">

    <div class="d-flex justify-content-between align-items-end mb-3">
        <div>
            <h4 class="fw-bold mb-0">Clases Grupales</h4>
            <span class="text-muted small">Horarios, instructor y cupos por clase</span>
        </div>
        <button type="button" class="btn btn-primary d-flex align-items-center gap-1" onclick="nuevaClase()">
            <span class="material-symbols-outlined">add</span> Nueva clase
        </button>
    </div>

    <div class="row g-3 mb-3">
        <div class="col-md-3 col-6">
            <div class="card shadow-sm kpi p-3"><div class="d-flex justify-content-between align-items-center">
                <div><span class="text-muted small">Total</span><h3 class="fw-bold mb-0" th:text="${#lists.size(clases)}">0</h3></div>
                <span class="ico bg-primary bg-opacity-10 text-primary"><span class="material-symbols-outlined">exercise</span></span></div></div>
        </div>
        <div class="col-md-3 col-6">
            <div class="card shadow-sm kpi p-3"><div class="d-flex justify-content-between align-items-center">
                <div><span class="text-muted small">Programadas</span><h3 class="fw-bold mb-0 text-success" th:text="${#lists.size(clases.?[estadoGrupal.name() == 'PROGRAMADA'])}">0</h3></div>
                <span class="ico bg-success bg-opacity-10 text-success"><span class="material-symbols-outlined">event_available</span></span></div></div>
        </div>
        <div class="col-md-3 col-6">
            <div class="card shadow-sm kpi p-3"><div class="d-flex justify-content-between align-items-center">
                <div><span class="text-muted small">Finalizadas</span><h3 class="fw-bold mb-0 text-secondary" th:text="${#lists.size(clases.?[estadoGrupal.name() == 'FINALIZADA'])}">0</h3></div>
                <span class="ico bg-secondary bg-opacity-10 text-secondary"><span class="material-symbols-outlined">task_alt</span></span></div></div>
        </div>
        <div class="col-md-3 col-6">
            <div class="card shadow-sm kpi p-3"><div class="d-flex justify-content-between align-items-center">
                <div><span class="text-muted small">Canceladas</span><h3 class="fw-bold mb-0 text-danger" th:text="${#lists.size(clases.?[estadoGrupal.name() == 'CANCELADA'])}">0</h3></div>
                <span class="ico bg-danger bg-opacity-10 text-danger"><span class="material-symbols-outlined">event_busy</span></span></div></div>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div th:if="${msg}" class="alert alert-success alert-dismissible fade show py-2" role="alert">
                <span th:text="${msg}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show py-2" role="alert">
                <span th:text="${error}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle w-100" id="tabla">
                    <thead class="table-light">
                    <tr><th>#</th><th>Clase</th><th>Instructor</th><th>Fecha</th><th>Horario</th><th>Cupos</th><th>Estado</th><th class="text-end">Acciones</th></tr>
                    </thead>
                    <tbody>
                    <tr th:each="c : ${clases}">
                        <td th:text="${c.idClase}">1</td>
                        <td class="fw-semibold" th:text="${c.nombre}">Spinning</td>
                        <td th:text="${c.instructor != null ? c.instructor.nombres + ' ' + c.instructor.apellidos : '-'}">Inst</td>
                        <td th:text="${c.fecha}">2026-06-25</td>
                        <td th:text="${c.horaInicio + ' - ' + c.horaFin}">07:00 - 08:00</td>
                        <td>
                            <span th:text="${c.cuposDisponibles} + ' / ' + ${c.capacidad}">10 / 20</span>
                        </td>
                        <td>
                            <span class="badge rounded-pill"
                                  th:classappend="${c.estadoGrupal.name() == 'PROGRAMADA' ? 'bg-success-subtle text-success' : (c.estadoGrupal.name() == 'CANCELADA' ? 'bg-danger-subtle text-danger' : 'bg-secondary-subtle text-secondary')}"
                                  th:text="${c.estadoGrupal}">PROGRAMADA</span>
                        </td>
                        <td class="text-end text-nowrap">
                            <button type="button" class="btn btn-sm btn-light border" th:onclick="|editar(${c.idClase})|" title="Editar">
                                <span class="material-symbols-outlined text-primary">edit</span>
                            </button>
                            <a th:href="@{/gestionclase/desactivar/{id}(id=${c.idClase})}"
                               class="btn btn-sm btn-light border" title="Cancelar"
                               onclick="return confirm('¿Cancelar esta clase?');">
                                <span class="material-symbols-outlined text-danger">event_busy</span>
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <form id="form" th:action="@{/gestionclase/registrar}" th:object="${clase}" method="post">
                <div class="modal-header bg-primary text-white">
                    <h6 class="modal-title" id="tituloModal">Registrar clase</h6>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" th:field="*{idClase}">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label small text-muted">Nombre de la clase</label>
                            <input type="text" class="form-control" th:field="*{nombre}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small text-muted">Instructor</label>
                            <select class="form-select" th:field="*{instructor.idInstructor}" required>
                                <option value="0">Seleccione un instructor</option>
                                <option th:each="i : ${instructores}" th:value="${i.idInstructor}" th:text="${i.nombres + ' ' + i.apellidos}">Inst</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label small text-muted">Descripcion</label>
                            <textarea class="form-control" rows="2" th:field="*{descripcion}"></textarea>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label small text-muted">Capacidad</label>
                            <input type="number" min="1" class="form-control" th:field="*{capacidad}" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label small text-muted">Cupos disponibles</label>
                            <input type="number" min="0" class="form-control" th:field="*{cuposDisponibles}" required>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label small text-muted">Fecha</label>
                            <input type="date" class="form-control" th:field="*{fecha}" required>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label small text-muted">Inicio</label>
                            <input type="time" class="form-control" th:field="*{horaInicio}" required>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label small text-muted">Fin</label>
                            <input type="time" class="form-control" th:field="*{horaFin}" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small text-muted">Estado</label>
                            <select class="form-select" th:field="*{estadoGrupal}" required>
                                <option th:each="e : ${estados}" th:value="${e}" th:text="${e}">PROGRAMADA</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const base = '/gestionclase';
    let modal;
    $(function () {
        modal = new bootstrap.Modal(document.getElementById('modal'));
        $('#tabla').DataTable({
            language: { url: 'https://cdn.datatables.net/plug-ins/1.13.8/i18n/es-ES.json' },
            pageLength: 10, order: [ [3, 'asc'] ], columnDefs: [{ orderable: false, targets: -1 }]
        });
        document.getElementById('capacidad').addEventListener('input', function () {
            if (document.getElementById('idClase').value == 0) {
                document.getElementById('cuposDisponibles').value = this.value;
            }
        });
    });
    function nuevaClase() {
        const f = document.getElementById('form');
        f.reset(); f.action = base + '/registrar';
        document.getElementById('idClase').value = 0;
        document.getElementById('instructor.idInstructor').value = '0';
        document.getElementById('estadoGrupal').value = 'PROGRAMADA';
        document.getElementById('tituloModal').textContent = 'Registrar clase';
        modal.show();
    }
    function editar(id) {
        fetch(base + '/buscar/' + id).then(r => r.json()).then(c => {
            const f = document.getElementById('form');
            f.action = base + '/actualizar';
            document.getElementById('idClase').value = c.idClase;
            document.getElementById('nombre').value = c.nombre ?? '';
            document.getElementById('instructor.idInstructor').value = (c.instructor && c.instructor.idInstructor) ? c.instructor.idInstructor : '0';
            document.getElementById('descripcion').value = c.descripcion ?? '';
            document.getElementById('capacidad').value = c.capacidad ?? '';
            document.getElementById('cuposDisponibles').value = c.cuposDisponibles ?? '';
            document.getElementById('fecha').value = c.fecha ?? '';
            document.getElementById('horaInicio').value = c.horaInicio ?? '';
            document.getElementById('horaFin').value = c.horaFin ?? '';
            document.getElementById('estadoGrupal').value = c.estadoGrupal ?? 'PROGRAMADA';
            document.getElementById('tituloModal').textContent = 'Editar clase';
            modal.show();
        }).catch(() => alert('No se pudo cargar la clase.'));
    }
</script>
</body>
</html>
