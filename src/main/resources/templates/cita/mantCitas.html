<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymControl - Citas Nutricionales</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <style>
        body { font-family:'Inter',sans-serif; background:#f4f6f9; color:#3a3f47; }
        .material-symbols-outlined { font-size:1.25rem; line-height:1; vertical-align:middle; }
        .card { border:1px solid #e7e9ee; }
        .kpi .ico { width:42px; height:42px; display:flex; align-items:center; justify-content:center; border-radius:10px; }
        .kpi h3 { font-size:1.5rem; }
        thead th { font-size:.76rem; text-transform:uppercase; letter-spacing:.03em; color:#6c757d; }
    </style>
</head>
<body>
<div class="container-fluid py-4">

    <div class="d-flex justify-content-between align-items-end mb-3">
        <div>
            <h4 class="fw-bold mb-0">Citas Nutricionales</h4>
            <span class="text-muted small">Programacion de citas con nutricionistas</span>
        </div>
        <button type="button" class="btn btn-primary d-flex align-items-center gap-1" onclick="nuevaCita()">
            <span class="material-symbols-outlined">add</span> Nueva cita
        </button>
    </div>

    <div class="row g-3 mb-3">
        <div class="col-md-3 col-6">
            <div class="card shadow-sm kpi p-3"><div class="d-flex justify-content-between align-items-center">
                <div><span class="text-muted small">Pendientes</span><h3 class="fw-bold mb-0 text-warning" th:text="${#lists.size(citas.?[estado.name() == 'PENDIENTE'])}">0</h3></div>
                <span class="ico bg-warning bg-opacity-10 text-warning"><span class="material-symbols-outlined">schedule</span></span></div></div>
        </div>
        <div class="col-md-3 col-6">
            <div class="card shadow-sm kpi p-3"><div class="d-flex justify-content-between align-items-center">
                <div><span class="text-muted small">Confirmadas</span><h3 class="fw-bold mb-0 text-primary" th:text="${#lists.size(citas.?[estado.name() == 'CONFIRMADA'])}">0</h3></div>
                <span class="ico bg-primary bg-opacity-10 text-primary"><span class="material-symbols-outlined">event_available</span></span></div></div>
        </div>
        <div class="col-md-3 col-6">
            <div class="card shadow-sm kpi p-3"><div class="d-flex justify-content-between align-items-center">
                <div><span class="text-muted small">Atendidas</span><h3 class="fw-bold mb-0 text-success" th:text="${#lists.size(citas.?[estado.name() == 'ATENDIDA'])}">0</h3></div>
                <span class="ico bg-success bg-opacity-10 text-success"><span class="material-symbols-outlined">task_alt</span></span></div></div>
        </div>
        <div class="col-md-3 col-6">
            <div class="card shadow-sm kpi p-3"><div class="d-flex justify-content-between align-items-center">
                <div><span class="text-muted small">Canceladas</span><h3 class="fw-bold mb-0 text-danger" th:text="${#lists.size(citas.?[estado.name() == 'CANCELADA'])}">0</h3></div>
                <span class="ico bg-danger bg-opacity-10 text-danger"><span class="material-symbols-outlined">cancel</span></span></div></div>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div th:if="${msg}" class="alert alert-success alert-dismissible fade show py-2" role="alert">
                <span th:text="${msg}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show py-2" role="alert">
                <span th:text="${error}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle w-100" id="tabla">
                    <thead class="table-light">
                    <tr><th>#</th><th>Cliente</th><th>Nutricionista</th><th>Fecha</th><th>Hora</th><th>Estado</th><th class="text-end">Acciones</th></tr>
                    </thead>
                    <tbody>
                    <tr th:each="c : ${citas}">
                        <td th:text="${c.idCita}">1</td>
                        <td class="fw-semibold" th:text="${c.cliente != null ? c.cliente.nombres + ' ' + c.cliente.apellidos : '-'}">Cliente</td>
                        <td th:text="${c.nutricionista != null ? c.nutricionista.nombres + ' ' + c.nutricionista.apellidos : '-'}">Nutri</td>
                        <td th:text="${c.fecha}">2026-06-27</td>
                        <td th:text="${c.hora}">10:00</td>
                        <td>
                            <span class="badge rounded-pill"
                                  th:classappend="${c.estado.name() == 'ATENDIDA' ? 'bg-success-subtle text-success' : (c.estado.name() == 'CANCELADA' ? 'bg-danger-subtle text-danger' : (c.estado.name() == 'CONFIRMADA' ? 'bg-primary-subtle text-primary' : 'bg-warning-subtle text-warning'))}"
                                  th:text="${c.estado}">PENDIENTE</span>
                        </td>
                        <td class="text-end text-nowrap">
                            <button type="button" class="btn btn-sm btn-light border" th:onclick="|editar(${c.idCita})|" title="Editar">
                                <span class="material-symbols-outlined text-primary">edit</span>
                            </button>
                            <a th:href="@{/gestioncita/desactivar/{id}(id=${c.idCita})}"
                               class="btn btn-sm btn-light border" title="Cancelar"
                               onclick="return confirm('¿Cancelar esta cita?');">
                                <span class="material-symbols-outlined text-danger">cancel</span>
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <form id="form" th:action="@{/gestioncita/registrar}" th:object="${cita}" method="post">
                <div class="modal-header bg-primary text-white">
                    <h6 class="modal-title" id="tituloModal">Nueva cita</h6>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" th:field="*{idCita}">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label small text-muted">Cliente</label>
                            <select class="form-select" th:field="*{cliente.idCliente}" id="cliente.idCliente" required>
                                <option value="0">Seleccione un cliente</option>
                                <option th:each="cl : ${clientes}" th:value="${cl.idCliente}" th:text="${cl.nombres + ' ' + cl.apellidos}">Cliente</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small text-muted">Nutricionista</label>
                            <select class="form-select" th:field="*{nutricionista.idNutricionista}" id="nutricionista.idNutricionista" required>
                                <option value="0">Seleccione un nutricionista</option>
                                <option th:each="n : ${nutricionistas}" th:value="${n.idNutricionista}" th:text="${n.nombres + ' ' + n.apellidos}">Nutri</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small text-muted">Fecha</label>
                            <input type="date" class="form-control" th:field="*{fecha}" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small text-muted">Hora</label>
                            <input type="time" class="form-control" th:field="*{hora}" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small text-muted">Estado</label>
                            <select class="form-select" th:field="*{estado}" required>
                                <option th:each="e : ${estados}" th:value="${e}" th:text="${e}">PENDIENTE</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label small text-muted">Observaciones</label>
                            <textarea class="form-control" rows="2" th:field="*{observaciones}"></textarea>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const base = '/gestioncita';
    let modal;
    $(function () {
        modal = new bootstrap.Modal(document.getElementById('modal'));
        $('#tabla').DataTable({
            language: { url: 'https://cdn.datatables.net/plug-ins/1.13.8/i18n/es-ES.json' },
            pageLength: 10, order: [ [3, 'asc'] ], columnDefs: [{ orderable: false, targets: -1 }]
        });
    });
    function nuevaCita() {
        const f = document.getElementById('form');
        f.reset(); f.action = base + '/registrar';
        document.getElementById('idCita').value = 0;
        document.getElementById('cliente.idCliente').value = '0';
        document.getElementById('nutricionista.idNutricionista').value = '0';
        document.getElementById('estado').value = 'PENDIENTE';
        document.getElementById('tituloModal').textContent = 'Nueva cita';
        modal.show();
    }
    function editar(id) {
        fetch(base + '/buscar/' + id).then(r => r.json()).then(c => {
            const f = document.getElementById('form');
            f.action = base + '/actualizar';
            document.getElementById('idCita').value = c.idCita;
            document.getElementById('cliente.idCliente').value = (c.cliente && c.cliente.idCliente) ? c.cliente.idCliente : '0';
            document.getElementById('nutricionista.idNutricionista').value = (c.nutricionista && c.nutricionista.idNutricionista) ? c.nutricionista.idNutricionista : '0';
            document.getElementById('fecha').value = c.fecha ?? '';
            document.getElementById('hora').value = c.hora ?? '';
            document.getElementById('estado').value = c.estado ?? 'PENDIENTE';
            document.getElementById('observaciones').value = c.observaciones ?? '';
            document.getElementById('tituloModal').textContent = 'Editar cita';
            modal.show();
        }).catch(() => alert('No se pudo cargar la cita.'));
    }
</script>
</body>
</html>
