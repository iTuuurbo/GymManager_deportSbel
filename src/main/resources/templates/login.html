<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymControl - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <style>
        body { font-family:'Inter',sans-serif; background:#f4f6f9; }
    </style>
</head>
<body class="d-flex align-items-center vh-100">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow border-0 rounded-4">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <span class="d-inline-flex align-items-center justify-content-center bg-primary text-white rounded-3" style="width:56px;height:56px;">
                            <span class="material-symbols-outlined fs-2">fitness_center</span>
                        </span>
                        <h4 class="fw-bold mt-3 mb-0">GymControl</h4>
                        <span class="text-muted small">DeportSbelt</span>
                    </div>

                    <div th:if="${param.error}" class="alert alert-danger py-2 small" role="alert">
                        Usuario o clave incorrectos.
                    </div>
                    <div th:if="${param.sinacceso}" class="alert alert-warning py-2 small" role="alert">
                        No tienes permiso para acceder al sistema.
                    </div>
                    <div th:if="${param.logout}" class="alert alert-success py-2 small" role="alert">
                        Sesion cerrada correctamente.
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label small text-muted">Usuario</label>
                            <input type="text" name="username" class="form-control" placeholder="Ingrese su usuario" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small text-muted">Clave</label>
                            <input type="password" name="password" class="form-control" placeholder="Ingrese su clave" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 text-white fw-semibold">Ingresar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
