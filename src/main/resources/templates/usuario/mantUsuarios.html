<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion de Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4">

    <div class="card shadow">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h3 class="mb-0">Mantenimiento de Usuarios</h3>
            <button type="button" class="btn btn-light btn-sm" onclick="nuevoUsuario()">+ Nuevo usuario</button>
        </div>

        <div class="card-body">
            <div th:if="${msg}" class="alert alert-success alert-dismissible fade show" role="alert">
                <span th:text="${msg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <table class="table table-bordered table-hover table-striped align-middle">
                <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Username</th>
                    <th>Rol</th>
                    <th>Estado</th>
                    <th class="text-end">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u : ${usuarios}">
                    <td th:text="${u.idUsuario}">1</td>
                    <td th:text="${u.username}">user</td>
                    <td th:text="${u.idRol != null ? u.idRol.nombre : '-'}">ROL</td>
                    <td>
                        <span class="badge"
                              th:classappend="${u.estado == 1 ? 'text-bg-success' : 'text-bg-secondary'}"
                              th:text="${u.estado == 1 ? 'Activo' : 'Inactivo'}">Activo</span>
                    </td>
                    <td class="text-end">
                        <button type="button" class="btn btn-sm btn-warning"
                                th:onclick="|editarUsuario(${u.idUsuario})|">Editar</button>
                        <a th:href="@{/gestionusuario/desactivar/{id}(id=${u.idUsuario})}"
                           class="btn btn-sm btn-danger"
                           onclick="return confirm('¿Desactivar este usuario?');">Desactivar</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(usuarios)}">
                    <td colspan="5" class="text-center text-muted py-4">No hay usuarios registrados.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal -->
<div class="modal fade" id="modalUsuario" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <form id="formUsuario" th:action="@{/gestionusuario/registrar}" th:object="${usuario}" method="post">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitulo">Registrar Usuario</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" th:field="*{idUsuario}">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-control" th:field="*{username}" maxlength="50" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" th:field="*{password}"
                               placeholder="Dejar vacio para no cambiar (al editar)">
                        <small class="text-muted">Al registrar es obligatorio. Al editar, vacio = mantiene el actual.</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Rol</label>
                        <select class="form-select" th:field="*{idRol.idRol}" required>
                            <option value="0">Seleccione un rol</option>
                            <option th:each="rl : ${roles}"
                                    th:value="${rl.idRol}"
                                    th:text="${rl.nombre}">ROL</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Estado</label>
                        <select class="form-select" th:field="*{estado}" required>
                            <option value="1">Activo</option>
                            <option value="0">Inactivo</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const URL_BASE = '/gestionusuario';
    const modalUsuario = new bootstrap.Modal(document.getElementById('modalUsuario'));
    const form = document.getElementById('formUsuario');

    function nuevoUsuario() {
        form.reset();
        form.setAttribute('action', URL_BASE + '/registrar');
        document.getElementById('idUsuario').value = 0;
        document.getElementById('estado').value = '1';
        document.getElementById('idRol.idRol').value = '0';
        document.getElementById('modalTitulo').textContent = 'Registrar Usuario';
        modalUsuario.show();
    }

    function editarUsuario(id) {
        fetch(URL_BASE + '/buscar/' + id)
            .then(resp => resp.json())
            .then(u => {
                form.setAttribute('action', URL_BASE + '/actualizar');
                document.getElementById('idUsuario').value = u.idUsuario;
                document.getElementById('username').value = u.username ?? '';
                document.getElementById('password').value = ''; // no se precarga (viene @JsonIgnore)
                document.getElementById('idRol.idRol').value = (u.idRol && u.idRol.idRol) ? u.idRol.idRol : '0';
                document.getElementById('estado').value = u.estado;
                document.getElementById('modalTitulo').textContent = 'Editar Usuario';
                modalUsuario.show();
            })
            .catch(() => alert('No se pudo cargar el usuario.'));
    }
</script>
</body>
</html>
